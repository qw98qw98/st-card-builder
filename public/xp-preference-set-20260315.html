        <style>
            :root {
                --primary: #007AFF;
                --dark-blue: #0056b3;
                --bg: #f2f2f7;
                --card: #ffffff;
                --sidebar-w: 320px;
            }
            * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
            body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; color: #1c1c1e; min-height: 100vh; }
            
            /* --- 主体区域 --- */
            .main-content { flex: 1; padding: 0 20px 100px 20px; transition: all 0.3s; margin-right: var(--sidebar-w); }
            .container { max-width: 900px; margin: 0 auto; }

            /* --- 搜索栏 --- */
            .search-container { position: sticky; top: 0; background: var(--bg); padding: 15px 0; z-index: 800; }
            .search-input { width: 100%; padding: 12px 20px; border-radius: 12px; border: 1px solid #d1d1d6; font-size: 1rem; outline: none; }
            .search-input:focus { border-color: var(--primary); background: #fff; }

            /* --- 侧边收藏栏 --- */
            .sidebar {
                width: var(--sidebar-w); height: 100vh; background: #fff; border-left: 1px solid #d1d1d6;
                position: fixed; right: 0; top: 0; display: flex; flex-direction: column; z-index: 1000;
                transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .sidebar-header { padding: 20px; font-weight: bold; background: #f9f9f9; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
            .fav-list { flex: 1; overflow-y: auto; padding: 15px; }
            .fav-item { 
                background: #f2f2f7; padding: 12px; border-radius: 10px; margin-bottom: 10px;
                display: flex; justify-content: space-between; align-items: center; cursor: pointer;
            }

            /* --- 折叠与按钮 --- */
            .cat-details { background: var(--card); border-radius: 14px; margin-bottom: 15px; border: 1px solid #e5e5ea; overflow: hidden; }
            .cat-summary { background: var(--dark-blue); color: #fff; padding: 15px; cursor: pointer; font-weight: bold; list-style: none; }
            .sub-details { margin: 10px; border: 1px solid #efeff4; border-radius: 10px; background: #fafafa; }
            .sub-summary { padding: 10px 15px; color: var(--primary); cursor: pointer; font-weight: 600; list-style: none; }
            .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; padding: 12px; }
            .xp-button { background: #fff; border: 1px solid #d1d1d6; padding: 12px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; }
            .xp-button.hidden { display: none; }
            .xp-id { color: var(--primary); font-weight: bold; margin-right: 6px; }

            /* --- 移动端专用样式 --- */
            .mobile-fav-btn { display: none; position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; background: var(--primary); color: white; border-radius: 50%; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1100; cursor: pointer; border: none; }
            .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 999; backdrop-filter: blur(4px); }

            @media (max-width: 900px) {
                .main-content { margin-right: 0; padding: 0 15px 100px 15px; }
                .sidebar { 
                    width: 100%; height: 70vh; top: auto; bottom: 0; 
                    transform: translateY(101%); border-left: none; border-radius: 20px 20px 0 0;
                }
                .sidebar.active { transform: translateY(0); }
                .mobile-fav-btn { display: flex; }
                .sidebar-overlay.active { display: block; }
            }

            /* --- 弹窗 --- */
            .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); z-index: 2000; }
            .modal-content { background: #fff; width: 90%; max-width: 450px; padding: 30px; border-radius: 20px; position: relative; }
            .select-btn { width: 100%; background: #34c759; color: #fff; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        </style>

        <script>
            let favorites = JSON.parse(localStorage.getItem('my_xp_favs')) || [];
            renderFavs();

            // --- 搜索逻辑 (含自动展开) ---
            function doSearch() {
                const query = document.getElementById('search-input').value.trim().toLowerCase();
                const buttons = document.querySelectorAll('.xp-button');
                
                if (query === "") {
                    buttons.forEach(b => b.classList.remove('hidden'));
                    document.querySelectorAll('.sub-details, .cat-details').forEach(d => d.style.display = 'block');
                    return;
                }

                buttons.forEach(btn => {
                    const match = btn.innerText.toLowerCase().includes(query);
                    btn.classList.toggle('hidden', !match);
                    if (match) {
                        let p = btn.parentElement;
                        while(p && p.tagName !== 'BODY') {
                            if(p.tagName === 'DETAILS') p.open = true;
                            p = p.parentElement;
                        }
                    }
                });

                document.querySelectorAll('.sub-details').forEach(sub => {
                    const visible = sub.querySelectorAll('.xp-button:not(.hidden)').length > 0;
                    sub.style.display = visible ? 'block' : 'none';
                    const cat = sub.closest('.cat-details');
                    if(cat) cat.style.display = cat.querySelectorAll('.xp-button:not(.hidden)').length > 0 ? 'block' : 'none';
                });
            }

            // --- 侧边栏切换 ---
            function toggleSidebar() {
                const sb = document.getElementById('sidebar');
                const overlay = document.getElementById('sb-overlay');
                sb.classList.toggle('active');
                overlay.classList.toggle('active');
                document.body.style.overflow = sb.classList.contains('active') ? 'hidden' : 'auto';
            }

            // --- 收藏核心 ---
            function renderFavs() {
                const list = document.getElementById('fav-list');
                list.innerHTML = favorites.map(f => `
                    <div class="fav-item" onclick="locate('${f.id}', '${f.name}', '${f.desc.replace(/'/g, "\'")}')">
                        <span><b>${f.id}</b> ${f.name}</span>
                        <span onclick="event.stopPropagation(); removeFav('${f.id}')" style="color:#ff3b30; font-size:1.2rem; padding:0 5px;">×</span>
                    </div>
                `).join('');
                localStorage.setItem('my_xp_favs', JSON.stringify(favorites));
            }

            function locate(id, name, desc) {
                const btn = document.getElementById('btn-' + id);
                if(btn) {
                    let p = btn.parentElement;
                    while(p && p.tagName !== 'BODY') { if(p.tagName==='DETAILS') p.open=true; p=p.parentElement; }
                    btn.scrollIntoView({behavior:'smooth', block:'center'});
                    btn.style.background = '#fff9c4';
                    setTimeout(() => btn.style.background = '#fff', 2000);
                    showModal(id, name, desc);
                    if(window.innerWidth <= 900) toggleSidebar(); 
                }
            }

            function showModal(id, name, desc) {
                document.getElementById('m-title').innerText = id + ". " + name;
                document.getElementById('m-desc').innerText = desc;
                document.getElementById('overlay').style.display = 'flex';
                document.getElementById('confirm-btn').onclick = () => {
                    if(!favorites.some(f => f.id === id)) { favorites.push({id, name, desc}); renderFavs(); }
                    closeModal();
                };
            }

            function closeModal() { document.getElementById('overlay').style.display = 'none'; }
            function removeFav(id) { favorites = favorites.filter(f=>f.id!==id); renderFavs(); }
            function clearAll() { if(confirm('确定清空收藏？')){favorites=[]; renderFavs();} }
        </script>
    </body>
    </html>
